url: https://johngavin.github.io/micromort/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    code-fold: true
    code-summary: "Show code"

home:
  title: Micromort - Curated Risk Datasets
  description: >
    A data package providing curated datasets of micromort (acute risk)
    and microlife (chronic risk) values from authoritative sources.
  opengraph:
    image:
      src: man/figures/og-image.png
      alt: "Micromort risk comparison quiz showing a ladder of activities from coffee to Mt. Everest"

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
      - text: "Architecture Overview"
        href: articles/architecture.html
      - text: "Project Telemetry"
        href: articles/telemetry.html
      - text: "---"
      - text: "Introduction"
        href: articles/introduction.html
      - text: "Palatable Units"
        href: articles/palatable_units.html
      - text: "Regional Variation"
        href: articles/regional_variation.html
      - text: "Risk Equivalence"
        href: articles/risk_equivalence.html
      - text: "Confounding Variables"
        href: articles/confounding.html
      - text: "Data Reliability"
        href: articles/data_reliability.html
      - text: "REST API"
        href: articles/rest_api.html
      - text: "---"
      - text: "Interactive"
      - text: "Risk Quiz (play in browser)"
        href: articles/quiz_shinylive.html

