name: Deploy pkgdown to GitHub Pages

# Per 9-step workflow:
# 1. Build locally with pkgdown::build_site()
# 2. Commit docs/ directory
# 3. Push to GitHub
# 4. This workflow deploys the pre-built docs/
#
# This saves CI quota and ensures fast, predictable deployments.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Verify pre-built docs exist
        run: |
          if [ ! -f "docs/index.html" ]; then
            echo "ERROR: docs/index.html not found!"
            echo "You must build locally with pkgdown::build_site() and commit docs/"
            exit 1
          fi
          echo "Pre-built docs/ found:"
          ls -la docs/*.html | head -10

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
