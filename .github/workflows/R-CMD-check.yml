name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          logger: pretty
          log-directives: nix_installer=trace
          backtrace: full

      - name: Setup magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix (rstats-on-nix + johngavin)
        uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix
          extraPullNames: johngavin

      - name: Build development environment
        run: nix-build default.nix -A shell --no-out-link

      - name: Run R CMD check
        run: |
          nix-shell default.nix -A shell --run "Rscript -e 'devtools::document(); devtools::check(error_on = \"error\", check_dir = \"check\")'"

      - name: Validate targets pipeline
        if: hashFiles('_targets.R') != ''
        run: |
          nix-shell default.nix -A shell --run "Rscript -e '
            targets::tar_validate()
            cat(\"Pipeline valid:\", length(targets::tar_manifest()\$name), \"targets\\n\")
          '"

      - name: Validate vignette targets exist
        if: hashFiles('vignettes/*.Rmd') != '' || hashFiles('vignettes/*.qmd') != ''
        run: |
          nix-shell default.nix -A shell --run "Rscript -e '
            # Check for vignette targets in pipeline
            manifest <- targets::tar_manifest()
            vig_targets <- manifest[grepl(\"^vig_\", manifest\$name), ]

            if (nrow(vig_targets) == 0) {
              stop(\"No vignette targets (vig_*) found in pipeline!
                   Vignettes must use pre-computed targets per quarto-files.md rule.\")
            }

            cat(\"Found\", nrow(vig_targets), \"vignette targets:\\n\")
            print(vig_targets[, c(\"name\")])
          '"

      - name: Check vignettes for inline computation
        if: hashFiles('vignettes/*.Rmd') != '' || hashFiles('vignettes/*.qmd') != ''
        run: |
          echo "Checking vignettes for forbidden patterns..."
          echo "Note: targets introspection (tar_visnetwork, tar_meta) is allowed"
          ERRORS=0

          for file in vignettes/*.Rmd vignettes/*.qmd; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")

            # Check for ggplot() construction (should be pre-computed)
            # EXCEPTION: Allow if file uses tar_meta/tar_visnetwork (pipeline vignette)
            if grep -q 'ggplot(' "$file" 2>/dev/null; then
              if grep -q 'tar_meta\|tar_visnetwork' "$file" 2>/dev/null; then
                echo "INFO: $filename has ggplot() with targets introspection (allowed)"
              else
                echo "ERROR: $filename has ggplot() calls - should be pre-computed"
                ERRORS=$((ERRORS + 1))
              fi
            fi

            # Check for DBI queries - NO EXCEPTION
            if grep -q 'dbGetQuery\|dbExecute' "$file" 2>/dev/null; then
              echo "ERROR: $filename has database queries - use targets"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "Found $ERRORS vignette validation errors"
            echo "See quarto-files.md: 'MANDATORY: Vignettes contain ZERO computation'"
            exit 1
          fi

          echo "All vignettes pass inline computation check"

      - name: Check URLs in package documentation
        run: |
          nix-shell default.nix -A shell --run "Rscript -e '
            if (requireNamespace(\"urlchecker\", quietly = TRUE)) {
              results <- urlchecker::url_check(\".\")
              if (nrow(results) > 0) {
                cat(\"URL issues found:\\n\")
                print(results)
                # Warn but do not fail - some URLs may be temporarily down
                cat(\"::warning::Found\", nrow(results), \"URL issue(s) in package documentation\\n\")
              } else {
                cat(\"All URLs OK\\n\")
              }
            } else {
              cat(\"urlchecker not available, skipping URL checks\\n\")
            }
          '"

      - name: Verify pkgdown navbar articles match docs/
        if: hashFiles('_pkgdown.yml') != ''
        run: |
          ERRORS=0
          for article in $(grep -o 'articles/[a-z_]*\.html' _pkgdown.yml | sed 's|articles/||'); do
            if [ ! -f "docs/articles/$article" ]; then
              echo "MISSING: docs/articles/$article (listed in _pkgdown.yml but not built)"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: docs/articles/$article"
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS article(s) listed in _pkgdown.yml navbar but missing from docs/"
            echo "Run pkgdown::build_site() locally and commit docs/"
            exit 1
          fi
          echo "All navbar articles present in docs/"

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: R-CMD-check-results
          path: check/
          retention-days: 7
